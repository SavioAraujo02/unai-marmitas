<!DOCTYPE html>

<head>

    <title>Unaí Marmitas - Controle Mensal</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Meta tags para PWA e Mobile -->
    <meta name="theme-color" content="#FFD700">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Unaí Marmitas">
    
    <!-- Preload de recursos críticos -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <h1><i class="fas fa-utensils"></i> Unaí Marmitas</h1>
                    <p class="header-subtitle">Controle Mensal Profissional</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="btnLancamentos">
                        <i class="fas fa-calendar-alt"></i> Lançamentos
                    </button>
                    <button class="btn btn-primary" id="btnNovaEmpresa">
                        <i class="fas fa-plus"></i> Nova Empresa
                    </button>
                </div>
            </div>
        </header>

        <!-- Breadcrumb Navigation -->
        <nav class="breadcrumb" aria-label="breadcrumb">
            <ol class="breadcrumb-list">
                <li class="breadcrumb-item">
                    <a href="#" class="breadcrumb-link">
                        <i class="fas fa-home"></i> Dashboard
                    </a>
                </li>
                <li class="breadcrumb-item">
                    <i class="fas fa-building"></i> Empresas
                </li>
            </ol>
        </nav>

        <!-- Controles e Resumo Modernizados -->
        <section class="controls">
            <!-- Seletor de Período -->
            <div class="period-selector">
                <div class="month-selector">
                    <label for="selectMes">
                        <i class="fas fa-calendar-alt"></i> Período:
                    </label>
                    <select id="selectMes">
                        <option value="2025-08">Agosto/2025</option>
                    </select>
                    <button class="btn btn-secondary btn-sm" id="btnNovoMes">
                        <i class="fas fa-plus"></i> Novo Período
                    </button>
                </div>
                
                <div class="quick-search">
                    <input type="text" class="search-input" placeholder="🔍 Buscar empresa..." 
                           id="searchEmpresa" autocomplete="off">
                </div>
            </div>

            <!-- Resumo Visual Aprimorado -->
            <div class="resumo">
                <div class="resumo-card">
                    <h3><i class="fas fa-chart-pie"></i> PAINEL DE CONTROLE</h3>
                    
                    <!-- Progresso do Mês -->
                    <div class="progress-chart">
                        <div class="flex justify-between items-center mb-sm">
                            <span class="text-sm">Progresso do Mês</span>
                            <span class="text-sm" id="progressText">75%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 75%" id="progressFill"></div>
                        </div>
                    </div>
                    
                    <div class="resumo-stats">
                        <div class="stat-item stat-faturado">
                            <span class="stat-icon">💰</span>
                            <span class="stat-label">Total Faturado</span>
                            <span class="stat-value">R$ 0,00</span>
                        </div>
                        <div class="stat-item stat-empresas">
                            <span class="stat-icon">🏢</span>
                            <span class="stat-label">Empresas</span>
                            <span class="stat-value">0</span>
                        </div>
                        <div class="stat-item stat-concluidas">
                            <span class="stat-icon">✅</span>
                            <span class="stat-label">Concluídas</span>
                            <span class="stat-value">0</span>
                        </div>
                        <div class="stat-item stat-pendentes">
                            <span class="stat-icon">⏳</span>
                            <span class="stat-label">Pendentes</span>
                            <span class="stat-value">0</span>
                        </div>
                        <div class="stat-item stat-erro">
                            <span class="stat-icon">❌</span>
                            <span class="stat-label">Com Erro</span>
                            <span class="stat-value">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filtros Modernizados -->
            <div class="filtros">
                <button class="filter-btn active" data-filter="todos">
                    <span>Todos</span>
                </button>
                <button class="filter-btn" data-filter="pendentes">
                    <span>Pendentes</span>
                </button>
                <button class="filter-btn" data-filter="erro">
                    <span>Com Erro</span>
                </button>
                <button class="filter-btn" data-filter="concluidos">
                    <span>Concluídos</span>
                </button>
            </div>
        </section>

        <!-- Grid de Empresas -->
        <section class="empresas-grid" id="empresasGrid">
            <!-- Cards das empresas serão inseridos aqui via JavaScript -->
        </section>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" id="fabMain" title="Ações Rápidas">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Sistema de Notificações (temporário) -->
<script>
// Sistema de notificações temporário
window.NotificationManager = {
    show(message, type = 'info', duration = 3000) {
        const notification = document.createElement('div');
        notification.className = `notification notification-${type}`;
        notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            max-width: 300px;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        `;
        
        // Cores por tipo
        const colors = {
            success: '#28a745',
            error: '#dc3545',
            warning: '#ffc107',
            info: '#17a2b8'
        };
        
        notification.style.backgroundColor = colors[type] || colors.info;
        notification.textContent = message;
        
        document.body.appendChild(notification);
        
        // Animar entrada
        setTimeout(() => {
            notification.style.opacity = '1';
            notification.style.transform = 'translateX(0)';
        }, 100);
        
        // Remover após duração
        if (duration > 0) {
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, duration);
        }
        
        return notification;
    },
    
    success(message, duration = 3000) {
        return this.show(message, 'success', duration);
    },
    
    error(message, duration = 5000) {
        return this.show(message, 'error', duration);
    },
    
    warning(message, duration = 4000) {
        return this.show(message, 'warning', duration);
    },
    
    info(message, duration = 3000) {
        return this.show(message, 'info', duration);
    }
};
</script>

<!-- Compatibilidade temporária -->
<script src="js/compatibility.js"></script>

<!-- App principal como module -->
<script type="module" src="js/app.js"></script>

<!-- Correção do FAB - substituir o script anterior -->
<script>
// Aguarda a aplicação carregar
document.addEventListener('DOMContentLoaded', function() {
    // Aguarda um pouco mais para garantir que o app.js carregou
    setTimeout(initFABFallback, 1000);
});

function initFABFallback() {
    const fabMain = document.getElementById('fabMain');
    if (!fabMain) return;
    
    // Verifica se já foi inicializado pelo eventManager
    if (fabMain.hasAttribute('data-fab-initialized')) return;
    
    console.log('🔧 Inicializando FAB com fallback...');
    
    let isMenuOpen = false;
    let fabMenu = null;
    let fabOverlay = null;
    
    // Criar menu
    createFABMenu();
    
    // Event listener do botão principal
    fabMain.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        toggleFABMenu();
    });
    
    // Controlar tooltip
    fabMain.addEventListener('mouseenter', function() {
        if (!isMenuOpen) {
            this.setAttribute('data-show-tooltip', 'true');
        }
    });
    
    fabMain.addEventListener('mouseleave', function() {
        this.removeAttribute('data-show-tooltip');
    });
    
    // Marcar como inicializado
    fabMain.setAttribute('data-fab-initialized', 'true');
    
    function createFABMenu() {
        // Remover menu existente
        const existing = document.querySelectorAll('.fab-menu, .fab-overlay');
        existing.forEach(el => el.remove());
        
        // Criar overlay
        fabOverlay = document.createElement('div');
        fabOverlay.className = 'fab-overlay';
        fabOverlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            z-index: 998;
            display: none;
        `;
        
        fabOverlay.addEventListener('click', closeFABMenu);
        
        // Criar menu
        fabMenu = document.createElement('div');
        fabMenu.className = 'fab-menu';
        fabMenu.style.cssText = `
            position: fixed;
            bottom: 100px;
            right: 30px;
            display: none;
            flex-direction: column;
            gap: 15px;
            z-index: 999;
        `;
        
        // Itens do menu
        const menuItems = [
            {
                icon: 'fas fa-building',
                label: 'Nova Empresa',
                action: () => {
                    closeFABMenu();
                    if (window.app && window.app.modalNovaEmpresa) {
                        window.app.modalNovaEmpresa();
                    } else {
                        // Simula clique no botão existente
                        const btn = document.getElementById('btnNovaEmpresa');
                        if (btn) btn.click();
                        else alert('Função Nova Empresa ainda não implementada');
                    }
                }
            },
            {
                icon: 'fas fa-plus',
                label: 'Lançamento Rápido',
                action: () => {
                    closeFABMenu();
                    if (window.NotificationManager) {
                        window.NotificationManager.info('Função Lançamento Rápido em desenvolvimento');
                    } else {
                        alert('Função Lançamento Rápido em desenvolvimento');
                    }
                }
            },
            {
                icon: 'fas fa-chart-line',
                label: 'Analytics',
                action: () => {
                    closeFABMenu();
                    if (window.app && window.app.showAnalytics) {
                        window.app.showAnalytics();
                    } else {
                        if (window.NotificationManager) {
                            window.NotificationManager.info('Função Analytics em desenvolvimento');
                        } else {
                            alert('Função Analytics em desenvolvimento');
                        }
                    }
                }
            },
            {
                icon: 'fas fa-cog',
                label: 'Configurações',
                action: () => {
                    closeFABMenu();
                    if (window.app && window.app.showConfiguracoes) {
                        window.app.showConfiguracoes();
                    } else {
                        if (window.NotificationManager) {
                            window.NotificationManager.info('Função Configurações em desenvolvimento');
                        } else {
                            alert('Função Configurações em desenvolvimento');
                        }
                    }
                }
            }
        ];
        
        // Criar itens
        menuItems.forEach((item, index) => {
            const fabItem = document.createElement('a');
            fabItem.className = 'fab-item';
            fabItem.href = '#';
            fabItem.style.cssText = `
                display: flex;
                align-items: center;
                gap: 15px;
                padding: 12px 20px;
                background: rgba(248, 249, 250, 0.98);
                color: #333;
                border: 2px solid #FFD700;
                border-radius: 50px;
                cursor: pointer;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                transform: translateY(20px) scale(0.8);
                opacity: 0;
                white-space: nowrap;
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
                backdrop-filter: blur(10px);
                min-width: 200px;
                font-weight: 600;
                text-decoration: none;
                font-size: 14px;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            `;
            
            fabItem.innerHTML = `
                <i class="${item.icon}" style="font-size: 18px; width: 20px; text-align: center; color: inherit;"></i>
                <span style="flex: 1; color: inherit;">${item.label}</span>
            `;
            
            // Hover effects
            fabItem.addEventListener('mouseenter', function() {
                this.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
                this.style.color = '#1a1a1a';
                this.style.transform = 'translateY(0) scale(1.05)';
                this.style.boxShadow = '0 12px 35px rgba(255, 215, 0, 0.4)';
                this.style.borderColor = '#FFA500';
            });
            
            fabItem.addEventListener('mouseleave', function() {
                if (!isMenuOpen) return;
                this.style.background = 'rgba(248, 249, 250, 0.98)';
                this.style.color = '#333';
                this.style.transform = 'translateY(0) scale(1)';
                this.style.boxShadow = '0 8px 25px rgba(0, 0, 0, 0.15)';
                this.style.borderColor = '#FFD700';
            });
            
            fabItem.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                item.action();
            });
            
            fabMenu.appendChild(fabItem);
        });
        
        document.body.appendChild(fabOverlay);
        document.body.appendChild(fabMenu);
    }
    
    function toggleFABMenu() {
        if (isMenuOpen) {
            closeFABMenu();
        } else {
            openFABMenu();
        }
    }
    
    function openFABMenu() {
        isMenuOpen = true;
        
        // Esconder tooltip
        fabMain.setAttribute('data-menu-open', 'true');
        fabMain.removeAttribute('data-show-tooltip');
        
        // Mostrar overlay e menu
        fabOverlay.style.display = 'block';
        fabMenu.style.display = 'flex';
        
        // Animar botão principal
        fabMain.style.transform = 'rotate(45deg) scale(1.1)';
        fabMain.style.background = '#FFA500';
        
        // Blur no fundo
        document.body.style.filter = 'blur(0.5px)';
        document.querySelector('.container').style.filter = 'blur(1px)';
        
        // Animar itens do menu
        const items = fabMenu.querySelectorAll('.fab-item');
        items.forEach((item, index) => {
            setTimeout(() => {
                item.style.transform = 'translateY(0) scale(1)';
                item.style.opacity = '1';
            }, index * 80 + 100);
        });
    }
    
    function closeFABMenu() {
        isMenuOpen = false;
        
        // Mostrar tooltip novamente
        fabMain.removeAttribute('data-menu-open');
        
        // Animar saída dos itens
        const items = fabMenu.querySelectorAll('.fab-item');
        items.forEach((item, index) => {
            setTimeout(() => {
                item.style.transform = 'translateY(20px) scale(0.8)';
                item.style.opacity = '0';
            }, index * 40);
        });
        
        // Resetar botão principal
        fabMain.style.transform = 'scale(1)';
        fabMain.style.background = 'linear-gradient(135deg, #FFD700, #FFA500)';
        
        // Remover blur
        document.body.style.filter = '';
        document.querySelector('.container').style.filter = '';
        
        // Esconder menu após animação
        setTimeout(() => {
            if (fabOverlay) fabOverlay.style.display = 'none';
            if (fabMenu) fabMenu.style.display = 'none';
        }, 400);
    }
    
    // Fechar com ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && isMenuOpen) {
            closeFABMenu();
        }
    });
    
    // Fechar ao clicar fora
    document.addEventListener('click', function(e) {
        if (isMenuOpen && !fabMain.contains(e.target) && !fabMenu.contains(e.target)) {
            closeFABMenu();
        }
    });
}
</script>

<!-- CSS adicional para controlar o tooltip -->
<style>
.fab::before {
    content: attr(title);
    position: absolute;
    right: 70px;
    top: 50%;
    transform: translateY(-50%);
    background: #1a1a1a;
    color: #FFD700;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 1001;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.fab:hover::before {
    opacity: 1;
}

/* Esconder tooltip quando menu está aberto */
.fab[data-menu-open="true"]::before,
.fab[data-menu-open="true"]:hover::before {
    opacity: 0 !important;
    display: none !important;
}

/* Responsividade - esconder tooltip em mobile */
@media (max-width: 768px) {
    .fab::before {
        display: none !important;
    }
}
</style>
